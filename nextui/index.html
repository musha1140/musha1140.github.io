<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas-lighting.com | Next UI Landing</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", Courier, monospace;
      background: #050505;
      color: #d1d5db;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      border: 1px solid #1f2937;
      background: #0b0b0b;
      padding: 28px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
      color: #f3f4f6;
      letter-spacing: 0.04em;
    }
    p {
      margin: 0 0 20px;
      line-height: 1.55;
      color: #9ca3af;
    }
    nav {
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      text-decoration: none;
      border: 1px solid #374151;
      padding: 12px 14px;
      color: #e5e7eb;
      transition: 120ms ease;
    }
    a:hover {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.07);
    }
  </style>
</head>
<body>
  <main>
    <h1>Gas-Lighting Protocol</h1>
    <p>This is the primary landing page for gas-lighting.com on GitHub Pages.</p>
    <nav>
      <a href="/midi/">Open MIDI experience</a>
      <a href="/about/">About Gas-lighting LLC</a>
      <a href="/sandbox/">HOPS Sandbox</a>
      <a href="/kilo/">Kilo reference</a>
    </nav>
  </main>
</body>
</html>
